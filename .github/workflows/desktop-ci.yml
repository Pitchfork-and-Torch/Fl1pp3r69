name: desktop-ci

on:
  push:
    paths:
      - "desktop/**"
      - "schemas/**"
      - "examples/**"
      - ".github/workflows/desktop-ci.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "schemas/**"
      - "examples/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install desktop package
        run: |
          python -m pip install --upgrade pip
          pip install -e "./desktop[dev]"
      - name: Schema JSON parse
        run: python -c "import json,pathlib; [json.loads(p.read_text()) for p in pathlib.Path('schemas').glob('*.json')]"
      - name: Pytest
        run: pytest -q desktop/tests
      - name: CLI smoke
        run: |
          python -m flipper69 template list
          python -m flipper69 migrate
