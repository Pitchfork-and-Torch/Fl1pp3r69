    <path d="M-8,-36L20,-32L34,-16L28,2L10,6L-4,0Z" fill="#0a0a0c" stroke="#00d4ff" stroke-width="1.5" filter="url(#glowC)"/>
    <circle cx="16" cy="-18" r="4.5" fill="#c41e1e" filter="url(#glowR)"/>
    <line x1="-70" y1="-18" x2="10" y2="-18" stroke="#c41e1e" stroke-width="1.2" opacity="0.8"/>
    <path d="M28,2L42,16L54,34L64,52L70,70L66,78L56,70L46,52L36,34L24,16Z" fill="#0a0a0c" stroke="#00d4ff" stroke-width="1.1"/>
  </g>

