  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#scan)"/>
  <rect width="1600" height="900" fill="url(#vignette)"/>

  <g stroke="#c41e1e" stroke-width="2" fill="none" opacity="0.85">
    <path d="M48 48H120V56H56V120H48Z"/>
    <path d="M1552 48H1480V56H1544V120H1552Z"/>
    <path d="M48 852H120V844H56V780H48Z"/>
    <path d="M1552 852H1480V844H1544V780H1552Z"/>
  </g>
  <rect x="60" y="60" width="1480" height="3" fill="#c41e1e" opacity="0.7"/>

  <!-- Header -->
  <text x="800" y="112" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="58" font-weight="900" letter-spacing="3" fill="url(#greenGlow)" filter="url(#glowG)">FL1PP3R<tspan fill="#fff">6</tspan><tspan fill="url(#redGlow)" filter="url(#glowR)">9</tspan></text>
  <text x="800" y="144" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" fill="#9a9a9a" font-style="italic">The dolphin grew teeth.</text>
  <text x="800" y="170" text-anchor="middle" font-family="Consolas,monospace" font-size="13" fill="#ffb000" letter-spacing="2">UNCLASSIFIED // FIELD RESEARCH ONLY</text>

