  <g transform="translate(130,210)">
    <rect width="1340" height="54" rx="8" fill="#0c0c10" stroke="#1e1e24"/>
    <line x1="70" y1="27" x2="1270" y2="27" stroke="#222" stroke-width="2"/>
    <line x1="70" y1="27" x2="1270" y2="27" stroke="#39ff14" stroke-width="1.5" opacity="0.2" stroke-dasharray="5 8"/>
    <g font-family="Consolas,monospace" text-anchor="middle">
      <g transform="translate(70,27)"><circle r="13" fill="#111" stroke="#39ff14" stroke-width="2"/><text y="4" fill="#39ff14" font-size="9">IN</text><text y="30" fill="#888" font-size="9">INTAKE</text></g>
      <g transform="translate(260,27)"><circle r="13" fill="#111" stroke="#39ff14" stroke-width="2"/><text y="4" fill="#39ff14" font-size="8">OP</text><text y="30" fill="#888" font-size="9">OP_PREP</text></g>
      <g transform="translate(450,27)"><circle r="15" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2.5" filter="url(#glowC)"/><text y="4" fill="#00d4ff" font-size="9">PR</text><text y="30" fill="#00d4ff" font-size="9">PROBE</text></g>
      <g transform="translate(640,27)"><circle r="13" fill="#111" stroke="#ffb000" stroke-width="2"/><text y="4" fill="#ffb000" font-size="9">CP</text><text y="30" fill="#888" font-size="9">CAPTURE</text></g>
      <g transform="translate(830,27)"><circle r="13" fill="#111" stroke="#39ff14" stroke-width="2"/><text y="4" fill="#39ff14" font-size="8">VF</text><text y="30" fill="#888" font-size="9">VERIFY</text></g>
      <g transform="translate(1020,27)"><circle r="13" fill="#111" stroke="#c41e1e" stroke-width="2"/><text y="4" fill="#c41e1e" font-size="8">EX</text><text y="30" fill="#888" font-size="9">EXFIL</text></g>
      <g transform="translate(1210,27)"><circle r="13" fill="#111" stroke="#666" stroke-width="2"/><text y="4" fill="#aaa" font-size="8">CL</text><text y="30" fill="#888" font-size="9">CLOSE</text></g>
    </g>
